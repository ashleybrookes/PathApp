syntax = "proto3";

option csharp_namespace = "PathDrift.Shared.Protos";

package pathdrift;

// Service for streaming coordinate data from the primary service to the secondary service.
service CoordinateService {
  // Client-streaming RPC: the primary service streams all coordinates, then receives a summary result.
  rpc StreamCoordinates (stream CoordinateMessage) returns (StreamResult);
}

// Represents a single coordinate point from the path drift file.
message CoordinateMessage {
  string path_id = 1;
  int32 index = 2;
  double x = 3;
  double y = 4;
  double z = 5;
  double rx = 6;
  double ry = 7;
  double rz = 8;
}

// Result returned after all coordinates have been received.
message StreamResult {
  bool success = 1;
  int32 points_received = 2;
  string message = 3;
}

